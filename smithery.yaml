startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      fullrunApiKey:
        type: string
        description: "Your Fullrun API key (starts with frun_)"
    required:
      - fullrunApiKey
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: ["-y", "@fullrun/mcp"],
      env: {
        FULLRUN_API_KEY: config.fullrunApiKey
      }
    })
